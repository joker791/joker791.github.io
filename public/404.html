<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 页面未找到 | joker791.github.io</title>
    <style>
      :root {
        font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
        line-height: 1.5;
        font-weight: 400;

        color-scheme: light dark;
        color: rgba(255, 255, 255, 0.87);
        background-color: #242424;

        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        display: flex;
        place-items: center;
        min-width: 320px;
        min-height: 100vh;
      }

      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem;
        text-align: center;
      }

      .error-code {
        font-size: 8em;
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(135deg, #646cff 0%, #535bf2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.2em;
        animation: glow 2s ease-in-out infinite alternate;
      }

      @keyframes glow {
        from {
          filter: drop-shadow(0 0 20px #646cff66);
        }
        to {
          filter: drop-shadow(0 0 40px #646cffaa);
        }
      }

      h1 {
        font-size: 2.5em;
        line-height: 1.1;
        margin-bottom: 0.5em;
        color: rgba(255, 255, 255, 0.87);
      }

      p {
        font-size: 1.2em;
        color: #888;
        margin-bottom: 2em;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 2em;
      }

      a {
        text-decoration: none;
      }

      .btn {
        display: inline-block;
        border-radius: 8px;
        border: 1px solid transparent;
        padding: 0.8em 1.5em;
        font-size: 1em;
        font-weight: 500;
        font-family: inherit;
        background-color: #646cff;
        color: white;
        cursor: pointer;
        transition: all 0.25s;
      }

      .btn:hover {
        background-color: #535bf2;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(100, 108, 255, 0.4);
      }

      .btn-secondary {
        background-color: #1a1a1a;
        color: rgba(255, 255, 255, 0.87);
      }

      .btn-secondary:hover {
        border-color: #646cff;
        background-color: #2a2a2a;
      }

      .illustration {
        margin: 2em 0;
        font-size: 4em;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      @media (prefers-color-scheme: light) {
        :root {
          color: #213547;
          background-color: #ffffff;
        }

        h1 {
          color: #213547;
        }

        .btn-secondary {
          background-color: #f9f9f9;
          color: #213547;
        }

        .btn-secondary:hover {
          background-color: #e9e9e9;
        }
      }

      @media (max-width: 640px) {
        .error-code {
          font-size: 5em;
        }

        h1 {
          font-size: 1.8em;
        }

        p {
          font-size: 1em;
        }

        .buttons {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <div class="illustration">🔍</div>
      <h1>哎呀！页面走丢了</h1>
      <p>
        您访问的页面可能已被移除、重命名，或者从未存在过。<br>
        不过别担心，让我们帮您找到正确的方向！
      </p>
      <div class="buttons">
        <a href="/" class="btn">返回首页</a>
        <button onclick="history.back()" class="btn btn-secondary">返回上一页</button>
      </div>
    </div>

    <script>
      // 在控制台输出一些调试信息
      console.log('404 页面已加载');
      console.log('请求的路径:', window.location.pathname);

      // 可选：记录 404 错误到分析服务
      // 如果你使用 Google Analytics 或其他分析工具，可以在这里添加代码
    </script>
  </body>
</html>
